name: Build and push Docker image

on:
  push:
    branches: [main, dev]
    paths:
      [
        "Dockerfile",
        ".github/workflows/docker-image.yml",
        "**/*.ts",
        "**/*.vue",
        "package.json",
        "pnpm-lock.yaml",
      ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Read version and prepare tags
        id: tags
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=$VER" >> $GITHUB_OUTPUT
          REPO="${{ github.event.repository.name }}"
          {
            echo "ghcr.io/${{ github.repository }}:$VER"
            echo "ghcr.io/${{ github.repository }}:latest"
            echo "${{ steps.meta.outputs.tags }}"
            if [ -n "$DOCKERHUB_USERNAME" ]; then
              echo "docker.io/$DOCKERHUB_USERNAME/$REPO:$VER"
              echo "docker.io/$DOCKERHUB_USERNAME/$REPO:latest"
              echo "docker.io/$DOCKERHUB_USERNAME/$REPO:${{ github.ref_name }}"
              echo "docker.io/$DOCKERHUB_USERNAME/$REPO:sha-${{ github.sha }}"
            fi
          } | grep -v '^$' > tags.txt
          echo "list<<EOF" >> $GITHUB_OUTPUT
          cat tags.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push (single build, dual registry)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 仅 amd64：arm64 在 amd64 runner 上需 QEMU 模拟，耗时极长（可 10–50x）
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.list }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
